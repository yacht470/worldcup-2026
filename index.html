<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프리미어파트너스 2026 월드컵 우승국 맞추기 ⚽</title>
<style>
  :root{
    --red:#c8102e; --red-d:#7a0c1d; --red-deep:#4a0010; --red-bright:#e4002b;
    --gold:#ffd23f; --gold-d:#e0a800;
    --ink:#22070b; --card:#ffffff; --muted:#9a6b72; --line:#f0d9dd;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 420px at 50% -160px, #ff2b50 0%, transparent 70%),
      linear-gradient(165deg,#c8102e 0%,#7a0c1d 45%,#3d000c 100%);
    background-attachment:fixed; min-height:100vh; padding:26px 14px 60px;
    position:relative; overflow-x:hidden;
  }
  /* faint soccer-ball pattern in background */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.06;
    background-image:radial-gradient(circle at 12px 12px, #000 2px, transparent 3px);
    background-size:40px 40px;
  }
  .wrap{max-width:840px;margin:0 auto;position:relative;z-index:1;}

  /* ---------- header ---------- */
  header{text-align:center;color:#fff;margin-bottom:24px;}
  .mascots{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px;}
  .devil{width:96px;height:auto;filter:drop-shadow(0 6px 12px rgba(0,0,0,.45));animation:sway 3s ease-in-out infinite;}
  .devil.right{transform:scaleX(-1);animation-delay:.5s;}
  .ball{font-size:46px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));animation:bounce 1.8s ease-in-out infinite;}
  @keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  .devil.right{animation-name:swayR;}
  @keyframes swayR{0%,100%{transform:scaleX(-1) rotate(-4deg)}50%{transform:scaleX(-1) rotate(4deg)}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

  .brand{
    font-size:15px;font-weight:800;letter-spacing:3px;color:var(--gold);
    text-shadow:0 2px 6px rgba(0,0,0,.4);margin-bottom:2px;
  }
  header h1{
    margin:2px 0 6px;font-size:30px;line-height:1.2;letter-spacing:-.5px;
    text-shadow:0 3px 10px rgba(0,0,0,.45);
  }
  .bethereds{
    display:inline-block;background:#fff;color:var(--red);
    font-weight:900;font-style:italic;font-size:14px;letter-spacing:1px;
    padding:4px 16px;border-radius:20px;transform:rotate(-2deg);
    box-shadow:0 4px 12px rgba(0,0,0,.3);
  }

  /* ---------- panels ---------- */
  .panel{
    background:var(--card);border-radius:18px;
    box-shadow:0 18px 40px rgba(0,0,0,.3);padding:20px 18px;margin-bottom:18px;
    border-top:5px solid var(--red);
  }
  .panel h2{margin:0 0 6px;font-size:16px;display:flex;align-items:center;gap:8px;color:var(--red-d);}
  .panel h2 .tag{margin-left:auto;font-size:12px;font-weight:600;color:var(--muted);}
  .hint{font-size:12px;color:var(--muted);margin:0 0 14px;}

  /* ---------- participant rows ---------- */
  .row{
    display:flex;flex-wrap:wrap;align-items:center;gap:10px;
    padding:9px 10px;border-radius:12px;margin-bottom:8px;
    background:#fff6f7;border:1.5px solid var(--line);transition:.2s;
  }
  .row.win{
    background:linear-gradient(90deg,#fff3cf,#fffaf0);
    border-color:var(--gold);box-shadow:0 4px 18px rgba(224,168,0,.35);
  }
  .num{
    width:28px;height:28px;border-radius:50%;flex:0 0 auto;
    background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;
  }
  .row.win .num{background:var(--gold-d);}
  .name{flex:0 0 84px;font-weight:700;font-size:15px;}
  select{
    flex:1 1 200px;min-width:160px;padding:10px;
    border:1.5px solid var(--line);border-radius:10px;
    font-size:14px;font-family:inherit;background:#fff;color:var(--ink);outline:none;
  }
  select:focus{border-color:var(--red);}
  .chip{
    flex:0 0 auto;min-width:155px;
    display:flex;align-items:center;gap:8px;
    padding:7px 12px;border-radius:30px;font-weight:700;font-size:14px;
    background:#f3e3e5;color:var(--muted);
  }
  .chip.has{background:var(--red);color:#fff;}
  .chip .flag{font-size:22px;line-height:1;}
  .row.win .chip.has{background:var(--gold-d);color:#3a2600;}
  .badge{
    flex:0 0 auto;background:var(--gold);color:#5a3b00;font-weight:800;font-size:12px;
    padding:4px 11px;border-radius:20px;display:none;
  }
  .row.win .badge{display:inline-block;}

  /* ---------- winner setter ---------- */
  .winner-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .winner-row select{flex:1;min-width:180px;}
  button{font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:10px;padding:11px 18px;font-size:14px;transition:.15s;}
  button:active{transform:translateY(1px);}
  .btn-gold{background:var(--gold);color:#5a3b00;}
  .btn-gold:hover{background:var(--gold-d);}
  .btn-ghost{background:#f3e3e5;color:var(--red-d);}
  .btn-ghost:hover{background:#ecd2d6;}

  .result-banner{display:none;margin-top:14px;padding:16px;border-radius:14px;text-align:center;background:linear-gradient(135deg,#c8102e,#7a0c1d);color:#fff;}
  .result-banner.show{display:block;animation:pop .4s ease;}
  .result-banner .champ{font-size:24px;font-weight:800;margin:4px 0;}
  .result-banner .champ .flag{font-size:30px;}
  .result-banner .who{font-size:14px;color:#ffe2e6;margin-top:6px;line-height:1.6;}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}

  footer{text-align:center;color:#ffd0d6;font-size:12px;margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="mascots">
      <!-- 붉은 악마 (치우천왕) 마스코트 -->
      <svg class="devil" viewBox="0 0 140 150" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M40 56 C16 44 12 18 30 5 C29 26 41 38 54 47 Z" fill="#6b0010"/>
        <path d="M100 56 C124 44 128 18 110 5 C111 26 99 38 86 47 Z" fill="#6b0010"/>
        <path d="M70 26 C97 26 111 48 109 75 C107 106 90 130 70 130 C50 130 33 106 31 75 C29 48 43 26 70 26 Z" fill="#e4002b"/>
        <path d="M70 26 C97 26 111 48 109 75 C107 106 90 130 70 130 Z" fill="#c8102e" opacity=".4"/>
        <path d="M42 62 L68 74 L65 84 L42 74 Z" fill="#3a0008"/>
        <path d="M98 62 L72 74 L75 84 L98 74 Z" fill="#3a0008"/>
        <path d="M48 78 L67 82 L60 93 L49 90 Z" fill="#fff"/>
        <path d="M92 78 L73 82 L80 93 L91 90 Z" fill="#fff"/>
        <circle cx="58" cy="86" r="3.4" fill="#1a0004"/>
        <circle cx="82" cy="86" r="3.4" fill="#1a0004"/>
        <path d="M70 90 L63 104 L77 104 Z" fill="#9c0018"/>
        <path d="M48 108 Q70 126 92 108 Q70 116 48 108 Z" fill="#3a0008"/>
        <path d="M56 110 L60 119 L64 110 Z" fill="#fff"/>
        <path d="M76 110 L80 119 L84 110 Z" fill="#fff"/>
      </svg>

      <span class="ball">⚽</span>

      <svg class="devil right" viewBox="0 0 140 150" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M40 56 C16 44 12 18 30 5 C29 26 41 38 54 47 Z" fill="#6b0010"/>
        <path d="M100 56 C124 44 128 18 110 5 C111 26 99 38 86 47 Z" fill="#6b0010"/>
        <path d="M70 26 C97 26 111 48 109 75 C107 106 90 130 70 130 C50 130 33 106 31 75 C29 48 43 26 70 26 Z" fill="#e4002b"/>
        <path d="M70 26 C97 26 111 48 109 75 C107 106 90 130 70 130 Z" fill="#c8102e" opacity=".4"/>
        <path d="M42 62 L68 74 L65 84 L42 74 Z" fill="#3a0008"/>
        <path d="M98 62 L72 74 L75 84 L98 74 Z" fill="#3a0008"/>
        <path d="M48 78 L67 82 L60 93 L49 90 Z" fill="#fff"/>
        <path d="M92 78 L73 82 L80 93 L91 90 Z" fill="#fff"/>
        <circle cx="58" cy="86" r="3.4" fill="#1a0004"/>
        <circle cx="82" cy="86" r="3.4" fill="#1a0004"/>
        <path d="M70 90 L63 104 L77 104 Z" fill="#9c0018"/>
        <path d="M48 108 Q70 126 92 108 Q70 116 48 108 Z" fill="#3a0008"/>
        <path d="M56 110 L60 119 L64 110 Z" fill="#fff"/>
        <path d="M76 110 L80 119 L84 110 Z" fill="#fff"/>
      </svg>
    </div>

    <div class="brand">PREMIER PARTNERS · 프리미어파트너스</div>
    <h1>2026 월드컵 우승국 맞추기</h1>
    <div class="bethereds">BE THE REDS! 🔴</div>
  </header>

  <!-- 참가자 -->
  <div class="panel">
    <h2>👥 참가자 예측 <span class="tag">총 11명 · 가나다순</span></h2>
    <p class="hint">이름 옆 드롭다운에서 우승 예상국을 고르면 국기·국가명이 표시됩니다. 입력은 자동 저장돼요.</p>
    <div id="players"></div>
  </div>

  <!-- 우승국 확정 -->
  <div class="panel">
    <h2>🥇 우승국 확정</h2>
    <p class="hint">대회가 끝나면 실제 우승국을 선택하고 "우승 확정"을 누르세요.</p>
    <div class="winner-row">
      <select id="winnerSelect"></select>
      <button class="btn-gold" onclick="confirmWinner()">우승 확정 🏆</button>
      <button class="btn-ghost" onclick="clearWinner()">취소</button>
    </div>
    <div class="result-banner" id="banner"></div>
  </div>

  <div style="text-align:center;">
    <button class="btn-ghost" onclick="resetAll()">전체 초기화</button>
  </div>

  <footer>⚽ 대~한민국! · 본선 진출국 목록은 코드 상단 TEAMS 배열에서 편집할 수 있습니다.</footer>
</div>

<script>
/* ---- 2026 월드컵 본선 진출국 (대륙별, 국기 포함) ---- */
const TEAMS = [
  {g:"개최국", list:[ ["미국","🇺🇸"],["캐나다","🇨🇦"],["멕시코","🇲🇽"] ]},
  {g:"남미 (CONMEBOL)", list:[
    ["아르헨티나","🇦🇷"],["브라질","🇧🇷"],["우루과이","🇺🇾"],
    ["콜롬비아","🇨🇴"],["에콰도르","🇪🇨"],["파라과이","🇵🇾"] ]},
  {g:"유럽 (UEFA)", list:[
    ["프랑스","🇫🇷"],["잉글랜드","🏴󠁧󠁢󠁥󠁮󠁧󠁿"],["스페인","🇪🇸"],["포르투갈","🇵🇹"],
    ["네덜란드","🇳🇱"],["독일","🇩🇪"],["벨기에","🇧🇪"],["크로아티아","🇭🇷"],
    ["이탈리아","🇮🇹"],["스위스","🇨🇭"],["오스트리아","🇦🇹"],["덴마크","🇩🇰"],
    ["노르웨이","🇳🇴"],["폴란드","🇵🇱"],["튀르키예","🇹🇷"],["스코틀랜드","🏴󠁧󠁢󠁳󠁣󠁴󠁿"] ]},
  {g:"아시아 (AFC)", list:[
    ["일본","🇯🇵"],["대한민국","🇰🇷"],["이란","🇮🇷"],["호주","🇦🇺"],
    ["사우디아라비아","🇸🇦"],["카타르","🇶🇦"],["우즈베키스탄","🇺🇿"],["요르단","🇯🇴"] ]},
  {g:"아프리카 (CAF)", list:[
    ["모로코","🇲🇦"],["세네갈","🇸🇳"],["이집트","🇪🇬"],["알제리","🇩🇿"],
    ["튀니지","🇹🇳"],["나이지리아","🇳🇬"],["코트디부아르","🇨🇮"],["가나","🇬🇭"],["카메룬","🇨🇲"] ]},
  {g:"북중미 (CONCACAF)", list:[ ["파나마","🇵🇦"],["코스타리카","🇨🇷"],["자메이카","🇯🇲"] ]},
  {g:"오세아니아 (OFC)", list:[ ["뉴질랜드","🇳🇿"] ]},
  {g:"대륙간 플레이오프", list:[ ["이라크","🇮🇶"],["콩고민주공화국","🇨🇩"] ]},
];

/* 참가자 이름 (가나다순, 11명) */
const DEFAULT_NAMES = [
  "김민범","김병찬","김성은","문현식","송혁진","오태웅",
  "이동훈","임용기","전동훈","조준연","조현무"
];

const STORE_KEY = "wc2026_game_v4";
const FLAG = {};
TEAMS.forEach(grp => grp.list.forEach(([n,f]) => FLAG[n]=f));

let state = JSON.parse(localStorage.getItem(STORE_KEY) || "null") || {
  players: DEFAULT_NAMES.map(n => ({name:n, pick:""})),
  winner: ""
};

function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function teamOptions(selected){
  let html = `<option value="">— 우승 예상국 선택 —</option>`;
  TEAMS.forEach(grp=>{
    html += `<optgroup label="${grp.g}">`;
    grp.list.forEach(([n,f])=>{
      html += `<option value="${n}" ${n===selected?"selected":""}>${f} ${n}</option>`;
    });
    html += `</optgroup>`;
  });
  return html;
}

function renderPlayers(){
  const box = document.getElementById("players");
  box.innerHTML = "";
  state.players.forEach((p,i)=>{
    const isWin = state.winner && p.pick===state.winner;
    const row = document.createElement("div");
    row.className = "row" + (isWin ? " win":"");
    const chip = p.pick
      ? `<div class="chip has"><span class="flag">${FLAG[p.pick]||"🏳️"}</span>${p.pick}</div>`
      : `<div class="chip">미선택</div>`;
    row.innerHTML = `
      <div class="num">${i+1}</div>
      <div class="name">${p.name}</div>
      <select onchange="setPick(${i}, this.value)">${teamOptions(p.pick)}</select>
      ${chip}
      <span class="badge">🏆 WINNER!</span>
    `;
    box.appendChild(row);
  });
}

function setPick(i,v){ state.players[i].pick=v; save(); renderAll(); }

function renderWinnerSelect(){
  document.getElementById("winnerSelect").innerHTML = teamOptions(state.winner);
}

function renderBanner(){
  const b = document.getElementById("banner");
  if(!state.winner){ b.className="result-banner"; b.innerHTML=""; return; }
  const flag = FLAG[state.winner] || "🏳️";
  const winners = state.players.filter(p=>p.name.trim() && p.pick===state.winner);
  const who = winners.length===0
    ? "😅 아무도 맞히지 못했습니다!"
    : `🎉 정답자 (${winners.length}명): ` + winners.map(w=>`<b>${w.name}</b>`).join(", ");
  b.className = "result-banner show";
  b.innerHTML = `
    <div>이번 월드컵 우승국은</div>
    <div class="champ"><span class="flag">${flag}</span> ${state.winner}</div>
    <div class="who">${who}</div>`;
}

function renderAll(){ renderPlayers(); renderWinnerSelect(); renderBanner(); }

function confirmWinner(){
  const v = document.getElementById("winnerSelect").value;
  if(!v){ alert("우승국을 선택해주세요."); return; }
  state.winner = v; save(); renderAll();
  document.getElementById("banner").scrollIntoView({behavior:"smooth",block:"center"});
}
function clearWinner(){ state.winner=""; save(); renderAll(); }
function resetAll(){
  if(!confirm("모든 선택과 우승국을 초기화할까요? (이름은 유지됩니다)")) return;
  state.players.forEach(p=>p.pick="");
  state.winner="";
  save(); renderAll();
}

renderAll();
</script>
</body>
</html>
