<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스톱워치</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'IM Fell English', serif;
      overflow: hidden;
      background: #0d1b3e;
    }

    /* 소용돌이 별빛 캔버스 배경 */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px 64px;
      min-width: 420px;
      /* 캔버스 질감 느낌의 테두리 */
      background:
        repeating-linear-gradient(
          102deg,
          rgba(255,220,80,0.03) 0px, rgba(255,220,80,0.03) 2px,
          transparent 2px, transparent 8px
        ),
        repeating-linear-gradient(
          15deg,
          rgba(30,80,160,0.06) 0px, rgba(30,80,160,0.06) 1px,
          transparent 1px, transparent 7px
        ),
        rgba(10, 25, 70, 0.82);
      border: 3px solid transparent;
      border-radius: 4px;
      box-shadow:
        0 0 0 3px #c8a020,
        0 0 0 6px #1e3a7a,
        0 0 0 9px #c8a020,
        0 30px 80px rgba(0,0,0,0.7),
        inset 0 0 60px rgba(10,25,70,0.5);
      backdrop-filter: blur(2px);
    }

    /* 붓터치 느낌 상단 장식 */
    .container::before {
      content: '✦  별이 빛나는 밤  ✦';
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 5px;
      color: #c8a020;
      margin-bottom: 24px;
      text-shadow: 0 0 12px rgba(255,200,50,0.6);
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      letter-spacing: 6px;
      color: #f5d060;
      margin-bottom: 36px;
      text-shadow:
        0 0 20px rgba(255,210,60,0.8),
        0 2px 4px rgba(0,0,0,0.6);
      /* 붓터치 밑줄 */
      position: relative;
    }

    h1::after {
      content: '';
      display: block;
      height: 3px;
      margin: 10px auto 0;
      width: 70%;
      background: linear-gradient(90deg,
        transparent,
        #c8a020 20%,
        #f5e080 50%,
        #c8a020 80%,
        transparent
      );
      border-radius: 2px;
      filter: blur(0.5px);
    }

    .display {
      font-family: 'Cinzel', serif;
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 4px;
      font-variant-numeric: tabular-nums;
      color: #fff8d0;
      margin-bottom: 8px;
      text-shadow:
        0 0 30px rgba(255,230,100,0.9),
        0 0 60px rgba(255,200,50,0.5),
        0 3px 6px rgba(0,0,0,0.8);
      position: relative;
    }

    .ms {
      font-size: 2.6rem;
      color: #a8c8ff;
      text-shadow:
        0 0 20px rgba(150,200,255,0.8),
        0 2px 4px rgba(0,0,0,0.6);
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 40px;
    }

    button {
      padding: 13px 30px;
      border-radius: 3px;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    /* 붓터치 텍스처 버튼 공통 */
    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        85deg,
        transparent, transparent 3px,
        rgba(255,255,255,0.04) 3px, rgba(255,255,255,0.04) 4px
      );
      pointer-events: none;
    }

    #startStop {
      background: linear-gradient(135deg, #1a4a9e, #2a6fd4, #1a4a9e);
      color: #fff8d0;
      min-width: 110px;
      border: 2px solid #4a8ef0;
      box-shadow:
        0 0 14px rgba(70,140,240,0.5),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }

    #startStop:hover {
      background: linear-gradient(135deg, #2a5ab0, #3a80e8, #2a5ab0);
      box-shadow: 0 0 24px rgba(70,140,240,0.8), inset 0 1px 0 rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    #startStop.running {
      background: linear-gradient(135deg, #8b2a10, #d44a20, #8b2a10);
      border-color: #e06030;
      box-shadow: 0 0 14px rgba(220,90,40,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    #startStop.running:hover {
      background: linear-gradient(135deg, #a03010, #e85530, #a03010);
      box-shadow: 0 0 24px rgba(220,90,40,0.8);
      transform: translateY(-2px);
    }

    #lap, #reset {
      background: linear-gradient(135deg, #0a1a40, #152a60, #0a1a40);
      color: #a8c0e8;
      border: 2px solid #2a4a80;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    #lap:hover, #reset:hover {
      background: linear-gradient(135deg, #152a60, #203a80, #152a60);
      color: #c8d8f8;
      border-color: #4a6aa0;
      box-shadow: 0 0 14px rgba(50,100,200,0.4);
      transform: translateY(-2px);
    }

    button:active { transform: translateY(0) !important; }

    .laps {
      margin-top: 28px;
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #c8a020 transparent;
    }

    .laps::-webkit-scrollbar { width: 4px; }
    .laps::-webkit-scrollbar-thumb {
      background: linear-gradient(#c8a020, #f5d060);
      border-radius: 2px;
    }

    .lap-item {
      display: flex;
      justify-content: space-between;
      padding: 9px 14px;
      border-radius: 2px;
      margin-bottom: 5px;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      letter-spacing: 1px;
      background: linear-gradient(90deg, rgba(10,25,70,0.9), rgba(15,35,90,0.9));
      border-left: 3px solid #1e4080;
      color: #8aacdc;
      animation: fadeIn 0.3s ease;
    }

    .lap-item:first-child {
      color: #f0d878;
      background: linear-gradient(90deg, rgba(30,50,10,0.9), rgba(40,60,15,0.9));
      border-left-color: #c8a020;
      box-shadow: 0 0 10px rgba(200,160,30,0.2);
    }

    .lap-item .lap-num { color: #c8a020; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* 별 반짝임 */
    @keyframes twinkle {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 0.2; transform: scale(0.6); }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="container">
    <h1>스톱워치</h1>
    <div class="display">
      <span id="minutes">00</span>:<span id="seconds">00</span><span class="ms">.<span id="centiseconds">00</span></span>
    </div>
    <div class="buttons">
      <button id="startStop">시작</button>
      <button id="lap">랩</button>
      <button id="reset">초기화</button>
    </div>
    <div class="laps" id="laps"></div>
  </div>

  <script>
    /* ── 고흐 소용돌이 별빛 배경 ── */
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // 별 생성
    const stars = Array.from({ length: 120 }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 2.2 + 0.4,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.008,
    }));

    // 소용돌이 흐름장 (Van Gogh Starry Night feel)
    function flowAngle(x, y, t) {
      const nx = x / canvas.width;
      const ny = y / canvas.height;
      return (
        Math.sin(nx * 6 + t * 0.4) * 1.2 +
        Math.cos(ny * 5 - t * 0.3) * 1.0 +
        Math.sin((nx + ny) * 4 + t * 0.5) * 0.8
      );
    }

    // 소용돌이 스트로크 파티클
    const strokes = Array.from({ length: 260 }, () => ({
      x: Math.random() * 1,
      y: Math.random() * 1,
      len: Math.random() * 0.06 + 0.02,
      speed: Math.random() * 0.0004 + 0.0001,
      life: Math.random(),
      maxLife: Math.random() * 0.6 + 0.4,
    }));

    // Van Gogh 팔레트
    const palette = [
      '#0d2a6e', '#1a3d8f', '#1e4fa8',
      '#2561c4', '#3373d4', '#1a5590',
      '#f5c842', '#f0d060', '#e8b830',
      '#c8a020', '#fff8c0', '#a8c8ff',
      '#6090c8', '#304880',
    ];

    let t = 0;

    function drawBg() {
      const W = canvas.width, H = canvas.height;
      // 기본 밤하늘 그라디언트
      const grad = ctx.createRadialGradient(W * 0.3, H * 0.25, 0, W * 0.5, H * 0.5, W * 0.9);
      grad.addColorStop(0,   '#1a3a80');
      grad.addColorStop(0.3, '#0d2060');
      grad.addColorStop(0.6, '#091540');
      grad.addColorStop(1,   '#050e28');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    function drawStrokes() {
      const W = canvas.width, H = canvas.height;
      strokes.forEach(s => {
        s.life += s.speed;
        if (s.life > s.maxLife) {
          s.x = Math.random();
          s.y = Math.random();
          s.life = 0;
          s.maxLife = Math.random() * 0.6 + 0.4;
        }
        const px = s.x * W, py = s.y * H;
        const angle = flowAngle(px, py, t);
        const alpha = Math.sin((s.life / s.maxLife) * Math.PI) * 0.28;
        const len = s.len * Math.min(W, H);
        const color = palette[Math.floor((px / W * 8 + py / H * 6) % palette.length)];

        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(angle);
        ctx.strokeStyle = color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = Math.random() * 3 + 1.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-len / 2, 0);
        // 약간 휘어진 붓터치
        ctx.quadraticCurveTo(0, (Math.random() - 0.5) * len * 0.4, len / 2, 0);
        ctx.stroke();
        ctx.restore();

        // 흐름에 따라 천천히 이동
        s.x += Math.cos(angle) * s.speed * 0.8;
        s.y += Math.sin(angle) * s.speed * 0.8;
        if (s.x < 0) s.x = 1; if (s.x > 1) s.x = 0;
        if (s.y < 0) s.y = 1; if (s.y > 1) s.y = 0;
      });
    }

    function drawStars() {
      const W = canvas.width, H = canvas.height;
      stars.forEach(s => {
        const blink = 0.5 + 0.5 * Math.sin(s.phase + t * s.speed * 60);
        const px = s.x * W, py = s.y * H;

        // 별빛 후광
        const glow = ctx.createRadialGradient(px, py, 0, px, py, s.r * 8);
        glow.addColorStop(0,   `rgba(255,245,180,${0.7 * blink})`);
        glow.addColorStop(0.3, `rgba(200,210,255,${0.3 * blink})`);
        glow.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(px, py, s.r * 8, 0, Math.PI * 2);
        ctx.fill();

        // 별 본체
        ctx.fillStyle = `rgba(255,250,200,${0.6 + 0.4 * blink})`;
        ctx.beginPath();
        ctx.arc(px, py, s.r * blink, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function animate() {
      t += 0.012;
      drawBg();
      drawStrokes();
      drawStars();
      requestAnimationFrame(animate);
    }
    animate();
  </script>

  <script>
    let startTime = 0;
    let elapsed = 0;
    let timerInterval = null;
    let running = false;
    let lapCount = 0;
    let lastLapTime = 0;

    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    const csEl = document.getElementById('centiseconds');
    const startStopBtn = document.getElementById('startStop');
    const lapBtn = document.getElementById('lap');
    const resetBtn = document.getElementById('reset');
    const lapsEl = document.getElementById('laps');

    function format(ms) {
      const totalCs = Math.floor(ms / 10);
      const cs = totalCs % 100;
      const totalSec = Math.floor(ms / 1000);
      const sec = totalSec % 60;
      const min = Math.floor(totalSec / 60);
      return {
        min: String(min).padStart(2, '0'),
        sec: String(sec).padStart(2, '0'),
        cs: String(cs).padStart(2, '0'),
      };
    }

    function updateDisplay() {
      const now = running ? elapsed + (Date.now() - startTime) : elapsed;
      const f = format(now);
      minutesEl.textContent = f.min;
      secondsEl.textContent = f.sec;
      csEl.textContent = f.cs;
    }

    startStopBtn.addEventListener('click', () => {
      if (!running) {
        startTime = Date.now();
        timerInterval = setInterval(updateDisplay, 10);
        running = true;
        startStopBtn.textContent = '정지';
        startStopBtn.classList.add('running');
      } else {
        elapsed += Date.now() - startTime;
        clearInterval(timerInterval);
        running = false;
        startStopBtn.textContent = '시작';
        startStopBtn.classList.remove('running');
        updateDisplay();
      }
    });

    lapBtn.addEventListener('click', () => {
      if (!running && elapsed === 0) return;
      const now = running ? elapsed + (Date.now() - startTime) : elapsed;
      const lapTime = now - lastLapTime;
      lastLapTime = now;
      lapCount++;

      const item = document.createElement('div');
      item.className = 'lap-item';
      const ft = format(now);
      const fl = format(lapTime);
      item.innerHTML = `
        <span class="lap-num">랩 ${lapCount}</span>
        <span>+${fl.min}:${fl.sec}.${fl.cs}</span>
        <span>${ft.min}:${ft.sec}.${ft.cs}</span>
      `;
      lapsEl.insertBefore(item, lapsEl.firstChild);
    });

    resetBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      running = false;
      elapsed = 0;
      lapCount = 0;
      lastLapTime = 0;
      startStopBtn.textContent = '시작';
      startStopBtn.classList.remove('running');
      lapsEl.innerHTML = '';
      updateDisplay();
    });
  </script>
</body>
</html>
